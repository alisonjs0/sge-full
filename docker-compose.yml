services:
  # 1. Serviço de Banco de Dados (PostgreSQL) - Usando imagem do Docker Hub
  postgres:
    image: alisonjs0/fire-guard-postgres:latest  # Imagem pública no Docker Hub
    container_name: fire-guard-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"  # Porta configurável no host para evitar conflito
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 2. Serviço de Backend (Spring Boot) - OPCIONAL
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT}:8080"  # Backend local na porta configurável
    environment:
      # Configurações do banco de dados - CONECTA AO POSTGRES DOCKER HUB
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      # Configurações JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      # Configurações do Spring Boot
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # 3. Serviço de Frontend (Next.js - Fire Guard)
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT}:3000"
    environment:
      # OPÇÃO A: Backend local (descomente para usar backend local)
      # NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT}
      
      # OPÇÃO B: Backend Cloud Run (padrão - sem depender do backend local)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      
      # JWT Secret para validação no middleware
      JWT_SECRET: ${JWT_SECRET}
    # depends_on:
    #   - backend  # Descomente se usar backend local
    restart: unless-stopped

volumes:
  postgres_data: