services:
  # 1. Serviço de Banco de Dados (PostgreSQL) - Usando imagem do Docker Hub
  postgres:
    image: alisonjs0/fire-guard-postgres:latest  # Imagem pública no Docker Hub
    container_name: fire-guard-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 896271
      POSTGRES_DB: postgres
    ports:
      - "5434:5432"  # Porta 5434 no host para evitar conflito
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 2. Serviço de Backend (Spring Boot) - OPCIONAL
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    ports:
      - "8081:8080"  # Backend local na porta 8081
    environment:
      # Configurações do banco de dados - CONECTA AO POSTGRES DOCKER HUB
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 896271
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      # Configurações JWT (usando as mesmas do application.properties)
      JWT_SECRET: 602f31c91e483fb213f2a5f7bf364a14badc948099041e4e5f28d5795edd982f
      JWT_EXPIRATION: 3600000
      # Configurações do Spring Boot
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # 3. Serviço de Frontend (Next.js - Fire Guard)
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # OPÇÃO A: Backend local (descomente para usar backend local)
      # NEXT_PUBLIC_API_URL: http://localhost:8081
      
      # OPÇÃO B: Backend Cloud Run (padrão - sem depender do backend local)
      NEXT_PUBLIC_API_URL: https://fire-guard-backend-783901794609.us-central1.run.app
      
      # JWT Secret para validação no middleware
      JWT_SECRET: 602f31c91e483fb213f2a5f7bf364a14badc948099041e4e5f28d5795edd982f
    # depends_on:
    #   - backend  # Descomente se usar backend local
    restart: unless-stopped

volumes:
  postgres_data: