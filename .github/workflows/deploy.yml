name: Deploy to Google Cloud Run

on:
  push:
    branches: [ main, production ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: fire-guard-project-123  # Substitua pelo seu Project ID
  REGION: us-central1
  BACKEND_SERVICE: fire-guard-backend
  FRONTEND_SERVICE: fire-guard-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: fire_guard/package-lock.json
    
    - name: Test Backend
      run: |
        cd Trabalho-ads-back
        chmod +x ./mvnw
        ./mvnw test
    
    - name: Test Frontend
      run: |
        cd fire_guard
        npm ci
        npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
    
    - name: Configure Docker to use gcloud as credential helper
      run: |
        gcloud auth configure-docker
    
    - name: Build and Push Backend
      run: |
        cd Trabalho-ads-back
        gcloud builds submit --tag gcr.io/$PROJECT_ID/$BACKEND_SERVICE --file Dockerfile.production .
    
    - name: Build and Push Frontend
      run: |
        cd fire_guard
        gcloud builds submit --tag gcr.io/$PROJECT_ID/$FRONTEND_SERVICE --file Dockerfile.production .
    
    - name: Deploy Backend to Cloud Run
      run: |
        gcloud run deploy $BACKEND_SERVICE \
          --image gcr.io/$PROJECT_ID/$BACKEND_SERVICE \
          --platform managed \
          --region $REGION \
          --allow-unauthenticated \
          --port 8080 \
          --memory 1Gi \
          --cpu 1 \
          --min-instances 0 \
          --max-instances 10 \
          --set-env-vars="SPRING_PROFILES_ACTIVE=production" \
          --set-env-vars="JWT_SECRET=${{ secrets.JWT_SECRET }}" \
          --set-env-vars="JWT_EXPIRATION=3600000" \
          --set-env-vars="SPRING_DATASOURCE_URL=${{ secrets.DATABASE_URL }}" \
          --set-env-vars="SPRING_DATASOURCE_USERNAME=${{ secrets.DATABASE_USER }}" \
          --set-env-vars="SPRING_DATASOURCE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}"
    
    - name: Get Backend URL
      run: |
        BACKEND_URL=$(gcloud run services describe $BACKEND_SERVICE --platform managed --region $REGION --format 'value(status.url)')
        echo "BACKEND_URL=$BACKEND_URL" >> $GITHUB_ENV
    
    - name: Deploy Frontend to Cloud Run
      run: |
        gcloud run deploy $FRONTEND_SERVICE \
          --image gcr.io/$PROJECT_ID/$FRONTEND_SERVICE \
          --platform managed \
          --region $REGION \
          --allow-unauthenticated \
          --port 3000 \
          --memory 512Mi \
          --cpu 1 \
          --min-instances 0 \
          --max-instances 5 \
          --set-env-vars="NEXT_PUBLIC_API_URL=$BACKEND_URL" \
          --set-env-vars="JWT_SECRET=${{ secrets.JWT_SECRET }}"
    
    - name: Get Frontend URL
      run: |
        FRONTEND_URL=$(gcloud run services describe $FRONTEND_SERVICE --platform managed --region $REGION --format 'value(status.url)')
        echo "✅ Deployment successful!"
        echo "Frontend: $FRONTEND_URL"
        echo "Backend: $BACKEND_URL"